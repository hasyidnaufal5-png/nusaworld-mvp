</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { tab: 'masuk', agree: false };
  renderVals() {
    return {
      isMasuk: this.state.tab !== 'daftar',
      agree: this.state.agree,
      onMasuk: () => this.setState({ tab: 'masuk' }),
      onDaftar: () => this.setState({ tab: 'daftar' }),
      onToggleAgree: () => this.setState(s => ({ agree: !s.agree }))
    };
  }
}
</script>
